*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
    min-height: 100vh;
    min-height: 100dvh;
    font-family: 'Poppins', sans-serif;
    background: #020610;
    padding: 0;
    margin: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
}

#particles-canvas {
    position: fixed;
    inset: 0;
    z-index: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
}

/* ═══════════════════════════════════════════
   CARD
   ═══════════════════════════════════════════ */
.card {
    position: relative;
    z-index: 2;
    width: 95%;
    height: 95vh;
    height: 95dvh;
    max-width: 420px;
    max-height: 780px;
    overflow: hidden;
    background: rgba(8,18,40,0.35);
    border: 2px solid rgba(60,200,255,0.4);
    border-radius: 30px;
    backdrop-filter: blur(35px) saturate(1.5);
    -webkit-backdrop-filter: blur(35px) saturate(1.5);
    box-shadow:
        0 0 30px rgba(60,200,255,0.25),
        0 0 60px rgba(60,200,255,0.1),
        0 8px 32px rgba(0,0,0,0.3),
        inset 0 0 40px rgba(60,200,255,0.03);
    animation: fadeIn 0.8s ease forwards, borderGlow 4s ease-in-out infinite alternate;
    display: flex;
    flex-direction: column;
    justify-content: space-evenly;
}
#card-particles-canvas {
    position: absolute;
    inset: 0;
    z-index: 1;
    width: 100%;
    height: 100%;
    pointer-events: none;
    border-radius: 30px;
}

.card::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
        linear-gradient(135deg, rgba(60,200,255,0.06) 0%, transparent 40%, rgba(40,160,255,0.03) 100%);
    animation: neonPulse 4s ease-in-out infinite alternate;
    z-index: 0;
    pointer-events: none;
    border-radius: 30px;
}
.card::after {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 50%;
    background: linear-gradient(180deg, rgba(60,200,255,0.08) 0%, transparent 100%);
    z-index: 0;
    pointer-events: none;
    border-radius: 30px 30px 0 0;
}

/* ── Top Header (Logo + Name + Title) ─────── */
.card-top {
    text-align: center;
    padding: 14px 30px 4px;
    flex-shrink: 0;
    position: relative;
    z-index: 2;
}

.logo-k {
    width: 140px;
    height: 80px;
    margin: 6px auto;
    border: 1.5px solid rgba(60,200,255,0.35);
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 10px rgba(60,200,255,0.08), 0 0 20px rgba(60,200,255,0.04);
    position: relative;
    overflow: hidden;
    animation: logoEntrance 0.8s ease-out forwards;
}
.logo-k::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 16px;
    opacity: 0;
    pointer-events: none;
}
.logo-k:hover::after {
    background: rgba(255,255,255,0.15);
    box-shadow: 0 0 40px rgba(255,255,255,0.3), 0 0 80px rgba(255,255,255,0.1);
    animation: logoFlash 0.6s ease-out;
}
.logo-k img {
    width: 100%;
    height: 100%;
    object-fit: fill;
    display: block;
    border-radius: 14px;
}

.person-name {
    font-size: 1.4rem;
    font-weight: 700;
    color: #e8f0ff;
    margin-bottom: 4px;
    letter-spacing: -0.3px;
    text-shadow: 0 0 12px rgba(80,200,255,0.3);
}

.person-title {
    display: inline-block;
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #80d4ff;
    background: rgba(60,200,255,0.06);
    border: 1px solid rgba(60,200,255,0.2);
    padding: 4px 14px;
    border-radius: 50px;
    box-shadow: 0 0 15px rgba(60,200,255,0.1);
}

/* ── Divider ──────────────────────────────── */
.divider {
    height: 1px;
    background: rgba(60,200,255,0.25);
    margin: 0 28px;
    flex-shrink: 0;
    box-shadow: 0 0 4px rgba(60,200,255,0.1);
}

.contact-section {

.contact-row-static {

.contact-info-duo {

<script>
(function() {
    var COLORS = [
        'rgba(60,200,255,',
        'rgba(100,160,255,',
        'rgba(150,80,255,',
        'rgba(0,220,200,',
        'rgba(80,140,255,'
    ];

    function createParticleSystem(canvasId, count, speed, glow) {
        var canvas = document.getElementById(canvasId);
        var ctx = canvas.getContext('2d');
        var W, H;
        var particles = [];

        function resize() {
            W = canvas.width = canvas.parentElement.clientWidth;
            H = canvas.height = canvas.parentElement.clientHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        function P() { this.reset(); }
        P.prototype.reset = function() {
            this.x = Math.random() * W;
            this.y = Math.random() * H;
            this.r = Math.random() * 2.5 + 0.8;
            this.vx = (Math.random() - 0.5) * speed;
            this.vy = (Math.random() - 0.5) * speed;
            this.color = COLORS[Math.floor(Math.random() * COLORS.length)];
            this.alpha = Math.random() * 0.55 + 0.1;
            this.alphaDir = (Math.random() - 0.5) * 0.006;
        };
        P.prototype.update = function() {
            this.x += this.vx;
            this.y += this.vy;
            this.alpha += this.alphaDir;
            if (this.alpha <= 0.05 || this.alpha >= 0.6) this.alphaDir *= -1;
            if (this.x < -10) this.x = W + 10;
            if (this.x > W + 10) this.x = -10;
            if (this.y < -10) this.y = H + 10;
            if (this.y > H + 10) this.y = -10;
        };
        P.prototype.draw = function() {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
            ctx.fillStyle = this.color + this.alpha + ')';
            ctx.fill();
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.r * glow, 0, Math.PI * 2);
            ctx.fillStyle = this.color + (this.alpha * 0.18) + ')';
            ctx.fill();
        };

        for (var i = 0; i < count; i++) particles.push(new P());

        function animate() {
            ctx.clearRect(0, 0, W, H);
            for (var i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
            }
            requestAnimationFrame(animate);
        }
        animate();
    }

    var bgCount = Math.min(80, Math.floor((window.innerWidth * window.innerHeight) / 12000));
    createParticleSystem('particles-canvas', bgCount, 0.4, 3);

    var cardEl = document.querySelector('.card');
    var cardCount = Math.min(30, Math.floor((cardEl.clientWidth * cardEl.clientHeight) / 10000));
    createParticleSystem('card-particles-canvas', cardCount, 0.3, 3.5);
})();
</script>
