*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
    height: 100vh;
    height: 100dvh;
    font-family: 'Poppins', sans-serif;
    background: #06101e;
    overflow: hidden;
    padding: 0;
    margin: 0;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* ── Background ───────────────────────────── */
.bg {
    position: fixed;
    inset: 0;
    background: linear-gradient(180deg, #020610 0%, #040c1e 30%, #06142e 60%, #030a18 100%);
    z-index: 0;
}
.bg::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
        radial-gradient(ellipse 80% 50% at 50% 100%, rgba(8,30,60,0.6) 0%, transparent 70%),
        radial-gradient(ellipse 60% 40% at 20% 80%, rgba(15,45,90,0.35) 0%, transparent 60%),
        radial-gradient(ellipse 50% 30% at 80% 70%, rgba(10,40,80,0.3) 0%, transparent 60%);
    animation: waterFlow 8s ease-in-out infinite alternate;
}
.bg::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    width: 200%;
    height: 100%;
    background:
        radial-gradient(ellipse 40% 20% at 30% 90%, rgba(20,55,110,0.25) 0%, transparent 70%),
        radial-gradient(ellipse 35% 15% at 70% 85%, rgba(12,45,90,0.2) 0%, transparent 70%);
    animation: waterShimmer 6s ease-in-out infinite alternate-reverse;
}

.geo {
    position: absolute;
    border: 1.5px solid rgba(60,120,200,0.08);
    border-radius: 20px;
    animation: geoFloat 10s ease-in-out infinite alternate;
}
.geo-1 { width: 300px; height: 300px; top: -80px; left: -60px; transform: rotate(25deg); animation-duration: 10s; }
.geo-2 { width: 200px; height: 200px; bottom: -40px; right: -30px; transform: rotate(-15deg); animation-duration: 8s; animation-delay: -3s; }

/* ═══════════════════════════════════════════
   CARD
   ═══════════════════════════════════════════ */
.card {
    position: relative;
    z-index: 2;
    width: 100%;
    height: 100vh;
    height: 100dvh;
    max-width: 420px;
    max-height: 780px;
    overflow: hidden;
    background: rgba(8,18,40,0.45);
    border: 1px solid rgba(80,160,255,0.18);
    border-radius: 30px;
    backdrop-filter: blur(28px) saturate(1.3);
    -webkit-backdrop-filter: blur(28px) saturate(1.3);
    box-shadow:
        0 0 40px rgba(40,120,255,0.12),
        0 0 80px rgba(40,120,255,0.06),
        0 16px 48px rgba(0,0,0,0.35),
        inset 0 1px 0 rgba(100,180,255,0.1),
        inset 0 -1px 0 rgba(100,180,255,0.04);
    animation: fadeIn 0.8s ease forwards;
    display: flex;
    flex-direction: column;
}
.card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 50%;
    background: linear-gradient(180deg, rgba(80,160,255,0.06) 0%, transparent 100%);
    border-radius: 30px 30px 0 0;
    z-index: 0;
    pointer-events: none;
}
.card::after {
    content: '';
    position: absolute;
    inset: 0;
    background:
        linear-gradient(135deg, rgba(80,160,255,0.04) 0%, transparent 40%, rgba(60,140,240,0.02) 100%);
    animation: lightningGlow 3s ease-in-out infinite alternate;
    z-index: 0;
    pointer-events: none;
    border-radius: 30px;
}

/* ── Top Header (Logo + Name + Title) ─────── */
.card-top {

    flex-shrink: 0;
    position: relative;

}

.logo-k {

    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
}
.logo-k img {
    width: 100%;
    height: 100%;
    object-fit: fill;
    display: block;
    border-radius: 14px;
}

.person-name {
    font-size: 1.4rem;
    font-weight: 700;
    color: #fff;
    margin-bottom: 4px;
    letter-spacing: -0.3px;
}

.person-title {

    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #d4ac4b;
    background: rgba(212,172,75,0.08);
    border: 1px solid rgba(212,172,75,0.15);
    padding: 4px 14px;
    border-radius: 50px;
}

/* ── Divider ──────────────────────────────── */
.divider {

}

/* ── Contacts Area (fills middle) ─────────── */
.contacts-wrapper {

    justify-content: center;

.section-label i {

.label-phone { color: #25D366; background: rgba(37,211,102,0.08); border: 1px solid rgba(37,211,102,0.2); box-shadow: 0 0 12px rgba(37,211,102,0.1); }

.contact-section {

.contact-icon {

.icon-phone {

.contact-info {

/* ── Bottom Section (Buttons + Socials) ───── */
