    <style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
    height: 100vh;
    height: 100dvh;
    font-family: 'Poppins', sans-serif;
    background: #030810;
    overflow: hidden;
    padding: 0;
    margin: 0;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* ── Background ───────────────────────────── */
.bg {
    position: fixed;
    inset: 0;
    background: #030810;
    z-index: 0;
}

.geo {
    position: absolute;
    border: 1.5px solid rgba(244,208,63,0.12);
    border-radius: 20px;
    animation: geoFloat 10s ease-in-out infinite alternate;
}
.geo-1 { width: 300px; height: 300px; top: -80px; left: -60px; transform: rotate(25deg); animation-duration: 10s; }
.geo-2 { width: 200px; height: 200px; bottom: -40px; right: -30px; transform: rotate(-15deg); animation-duration: 8s; animation-delay: -3s; }

/* ═══════════════════════════════════════════
   CARD
   ═══════════════════════════════════════════ */
.card {
    position: relative;
    z-index: 2;
    width: 100%;
    height: 100vh;
    height: 100dvh;
    max-width: 420px;
    max-height: 780px;
    overflow: hidden;
    background: rgba(10, 26, 56, 0.75);
    border: 1px solid rgba(244,208,63,0.2);
    border-radius: 20px;
    backdrop-filter: blur(2px);
    -webkit-backdrop-filter: blur(2px);
    box-shadow: 0 0 60px rgba(244,208,63,0.06);
    animation: fadeIn 0.8s ease forwards;
    display: flex;
    flex-direction: column;
}
.card::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background:
        conic-gradient(from 0deg at 30% 40%, transparent 0deg, rgba(244,208,63,0.03) 60deg, transparent 120deg),
        conic-gradient(from 180deg at 70% 60%, transparent 0deg, rgba(244,208,63,0.02) 60deg, transparent 120deg);
    animation: canvasRotate 20s linear infinite;
    z-index: 0;
    pointer-events: none;
}
.card::after {
    content: '';
    position: absolute;
    inset: 0;
    background:
        radial-gradient(circle at 30% 20%, rgba(244,208,63,0.04) 0%, transparent 40%),
        radial-gradient(circle at 70% 80%, rgba(244,208,63,0.03) 0%, transparent 40%);
    animation: canvasPulse 6s ease-in-out infinite alternate;
    z-index: 0;
    pointer-events: none;
}

/* ── Top Header (Logo + Name + Title) ─────── */
.card-top {
    text-align: center;
    padding: 28px 30px 10px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    flex-shrink: 0;
    position: relative;
    z-index: 1;
}

.logo-k {
    width: 140px;
    height: 80px;
    margin: 14px auto;
    border: 2px solid rgba(244,208,63,0.3);
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
}
.logo-k img {
    width: 100%;
    height: 100%;
    object-fit: fill;
    display: block;
    border-radius: 14px;
}

.person-name {
    font-size: 1.4rem;
    font-weight: 700;
    color: #fff;
    margin-bottom: 8px;
    letter-spacing: -0.3px;
}

.person-title {
    display: inline-block;
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #F4D03F;
    background: rgba(244,208,63,0.1);
    border: 1px solid rgba(244,208,63,0.2);
    padding: 4px 14px;
    border-radius: 50px;
}

/* ── Divider ──────────────────────────────── */
.divider {
    height: 1px;
    background: rgba(255,255,255,0.06);
    margin: 0 28px;
    flex-shrink: 0;
}

/* ── Contacts Area (fills middle) ─────────── */
.contacts-wrapper {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
    z-index: 1;
}

.section-label {
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #F4D03F;
    padding: 8px 30px 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    flex-shrink: 0;
}
.section-label i {
    font-size: 0.72rem;
    opacity: 0.7;
}

.contact-section {
    padding: 0 16px 2px;
    flex-shrink: 0;
}

.contact-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 8px 10px;
    text-decoration: none;
    color: inherit;
    transition: all 0.25s ease;
    border-radius: 10px;
}
.contact-row:hover {
    background: rgba(255,255,255,0.04);
}

.contact-icon {
    width: 40px;
    height: 40px;
    min-width: 40px;
    border-radius: 10px;
    background: rgba(244,208,63,0.08);
    border: 1px solid rgba(244,208,63,0.1);
    display: flex;
    align-items: center;
    justify-content: center;
    color: #F4D03F;
    font-size: 0.85rem;
    transition: all 0.25s ease;
}
.contact-row:hover .contact-icon {
    background: #F4D03F;
    color: #10284D;
}

.contact-info {
    flex: 1;
    min-width: 0;
}

.contact-value {
    font-size: 0.9rem;
    color: rgba(255,255,255,0.9);
    font-weight: 400;
    display: block;
    line-height: 1.3;
    word-break: break-word;
}

.contact-value-sm {
    font-size: 0.75rem;
}

/* ── Bottom Section (Buttons + Socials) ───── */
.card-bottom {
    flex-shrink: 0;
    position: relative;
    z-index: 1;
}

.actions {
    padding: 6px 24px 4px;
    display: flex;
    justify-content: center;
}

.btn {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 11px 14px;
    border-radius: 12px;
    font-family: 'Poppins', sans-serif;
    font-weight: 600;
    font-size: 0.85rem;
    text-decoration: none;
    transition: all 0.3s ease;
    border: none;
    cursor: pointer;
    letter-spacing: 0.3px;
}

.btn-gold {
    background: #F4D03F;
    color: #10284D;
    box-shadow: 0 4px 16px rgba(244,208,63,0.25);
}
.btn-gold:hover {
    background: #e6c436;
    transform: translateY(-2px);
    box-shadow: 0 8px 25px rgba(244,208,63,0.4);
    color: #10284D;
}

.btn-outline {
    background: transparent;
    color: #F4D03F;
    border: 1.5px solid rgba(244,208,63,0.3);
}
.btn-outline:hover {
    background: rgba(244,208,63,0.1);
    border-color: #F4D03F;
    transform: translateY(-2px);
    color: #F4D03F;
}

.socials {
    padding: 2px 24px 10px;
    display: flex;
    justify-content: center;
    gap: 10px;
}

.social-link {
    width: 52px;
    height: 52px;
    border-radius: 14px;
    border: 1px solid rgba(244,208,63,0.25);
    display: flex;
    align-items: center;
    justify-content: center;
    color: rgba(255,255,255,0.45);
    font-size: 1.3rem;
    text-decoration: none;
    transition: all 0.3s ease;
}
.social-link:hover {
    background: #F4D03F;
    color: #10284D;
    border-color: #F4D03F;
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(244,208,63,0.3);
}

/* ── Footer (removed) ─────────────────────── */

/* ═══════════════════════════════════════════
   RESPONSIVE

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(30px) scale(0.97); }

@keyframes geoFloat {
    0% { transform: rotate(25deg) translate(0, 0); opacity: 0.4; }

}

@keyframes canvasRotate {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}

@keyframes canvasPulse {
    0% { opacity: 0.5; }
    100% { opacity: 1; }
}
    </style>
