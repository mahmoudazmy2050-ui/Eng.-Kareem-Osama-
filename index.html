*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
    min-height: 100vh;
    min-height: 100dvh;
    font-family: 'Poppins', sans-serif;
    background: #020610;
    padding: 0;
    margin: 0;
    display: flex;
    align-items: center;
    justify-content: center;

/* ═══════════════════════════════════════════
   CARD
   ═══════════════════════════════════════════ */
.card {
    position: relative;
    z-index: 2;
    width: 95%;
    height: 95vh;
    height: 95dvh;
    max-width: 420px;
    max-height: 780px;
    overflow: hidden;
    background: rgba(255,255,255,0.03);
    border: 2px solid rgba(212,172,75,0.35);
    border-radius: 30px;
    backdrop-filter: blur(50px) saturate(2);
    -webkit-backdrop-filter: blur(50px) saturate(2);
    box-shadow:
        0 0 30px rgba(40,120,255,0.1),
        0 0 60px rgba(40,120,255,0.05),
        0 8px 24px rgba(0,0,0,0.25),
        inset 0 1px 0 rgba(100,180,255,0.08),
        inset 0 -1px 0 rgba(100,180,255,0.04);
    animation: fadeIn 0.8s ease forwards;
    display: flex;
    flex-direction: column;
    justify-content: space-evenly;
}
.card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 50%;
    background: linear-gradient(180deg, rgba(80,160,255,0.06) 0%, transparent 100%);
    border-radius: 30px 30px 0 0;
    z-index: 0;
    pointer-events: none;
}
.card::after {
    content: '';
    position: absolute;
    inset: 0;
    background:
        linear-gradient(135deg, rgba(80,160,255,0.04) 0%, transparent 40%, rgba(60,140,240,0.02) 100%);
    animation: lightningGlow 3s ease-in-out infinite alternate;
    z-index: 0;
    pointer-events: none;
    border-radius: 30px;
}

/* ── Top Header (Logo + Name + Title) ─────── */
.card-top {
    text-align: center;
    padding: 14px 30px 4px;
    border-bottom: 1px solid rgba(60,140,240,0.08);
    flex-shrink: 0;
    position: relative;
    z-index: 2;
}

.logo-k {
    width: 140px;
    height: 80px;
    margin: 6px auto;
    border: 1.5px solid rgba(212,172,75,0.3);
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 16px rgba(212,172,75,0.08);
    position: relative;
    overflow: hidden;
    animation: logoEntrance 0.8s ease-out forwards;
}
.logo-k::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 16px;
    opacity: 0;
    pointer-events: none;
}
.logo-k:hover::after {
    background: rgba(255,255,255,0.15);
    box-shadow: 0 0 40px rgba(255,255,255,0.3), 0 0 80px rgba(255,255,255,0.1);
    animation: logoFlash 0.6s ease-out;
}
.logo-k img {
    width: 100%;
    height: 100%;
    object-fit: fill;
    display: block;
    border-radius: 14px;
}

.person-name {
    font-size: 1.4rem;
    font-weight: 700;
    color: #e8edf5;
    margin-bottom: 4px;
    letter-spacing: -0.3px;
}

.person-title {
    display: inline-block;
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #d4ac4b;
    background: rgba(212,172,75,0.08);
    border: 1px solid rgba(212,172,75,0.2);
    padding: 4px 14px;
    border-radius: 50px;
    box-shadow: 0 0 12px rgba(212,172,75,0.06);
}

/* ── Divider ──────────────────────────────── */
.divider {
    height: 1px;
    background: rgba(212,172,75,0.25);
    margin: 0 28px;
    flex-shrink: 0;
}

/* ── Contacts Area (fills middle) ─────────── */
.contacts-wrapper {

    overflow: hidden;
    position: relative;
    z-index: 2;
}

.section-label {

    border-radius: 50px;

    align-items: center;
    justify-content: center;
    gap: 6px;
    flex-shrink: 0;
    margin: 10px auto 4px;

}
.section-label i {

}

.label-phone { color: #25D366; background: rgba(37,211,102,0.06); border: 1px solid rgba(37,211,102,0.2); box-shadow: 0 0 12px rgba(37,211,102,0.08); }
.label-phone i { color: #25D366; }
.label-email { color: #EA4335; background: rgba(234,67,53,0.06); border: 1px solid rgba(234,67,53,0.2); box-shadow: 0 0 12px rgba(234,67,53,0.08); }
.label-email i { color: #EA4335; }
.label-location { color: #4285F4; background: rgba(66,133,244,0.06); border: 1px solid rgba(66,133,244,0.2); box-shadow: 0 0 12px rgba(66,133,244,0.08); }
.label-location i { color: #4285F4; }

.contact-section {
    padding: 0 16px 2px;
    flex-shrink: 0;
}

.contact-row-static {
    cursor: default;
    text-decoration: none;
    color: inherit;
    transition: all 0.25s ease;
}

.contact-info-duo {
    display: flex;
    align-items: center;
    gap: 10px;
}
.contact-info-duo .contact-value {
    text-decoration: none;
    transition: all 0.2s ease;

}
.contact-info-duo .contact-value:hover {

}

.contact-sep {

    font-weight: 300;

}

.contact-row {

    transition: all 0.25s ease;

}
.contact-row:hover {
    background: rgba(60,140,240,0.06);
}

.contact-icon {

.icon-email {

.contact-row:hover .icon-email {

}

.icon-location {

}
.contact-row:hover .icon-location {

.contact-info {

}

.contact-value {

}

.contact-value-sm {

/* ── Bottom Section (Buttons + Socials) ───── */

.actions {

}

.btn-gold {

.btn-outline {

.socials {
